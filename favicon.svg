<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="35%" stop-color="#06b6d4"/>
      <stop offset="65%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="g2" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Kolorowe tło -->
  <rect width="32" height="32" rx="7" fill="url(#g1)"/>
  <!-- Szklana kropla -->
  <ellipse cx="16" cy="15" rx="9" ry="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.5)" stroke-width="0.8" filter="url(#glow)"/>
  <!-- Specular highlight -->
  <ellipse cx="13.5" cy="11" rx="5" ry="4" fill="url(#g2)"/>
  <!-- Mała kaustyka -->
  <circle cx="19" cy="19" r="1.8" fill="rgba(255,255,255,0.15)"/>
</svg>
